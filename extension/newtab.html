<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="https://github.com/Draftiermovie66/Aurora-Browser/blob/main/aurora.png" />
<title>Aurora Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    text-align: center;
    max-width: 640px;
    width: 100%;
  }
  
  /* --- UPGRADED LOGO STYLES --- */
  .logo-wrapper {
    width: 84px;
    height: 84px;
    margin: 0 auto 16px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(108, 99, 255, 0.2), rgba(0, 242, 254, 0.1));
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 22px;
    box-shadow: 
      0 8px 32px 0 rgba(0, 0, 0, 0.37),
      0 0 20px rgba(108, 99, 255, 0.2);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
    cursor: pointer;
  }
  .logo-wrapper:hover {
    transform: translateY(-4px) scale(1.05);
    box-shadow: 
      0 12px 40px 0 rgba(0, 0, 0, 0.5),
      0 0 30px rgba(0, 242, 254, 0.4);
  }
  .logo-wrapper svg {
    width: 48px;
    height: 48px;
    transition: filter 0.3s ease;
  }
  .logo-wrapper:hover svg {
    filter: drop-shadow(0 0 8px #00f2fe);
  }
  /* ---------------------------- */

  h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #a0a0c0;
    margin-bottom: 28px;
    font-size: 0.95rem;
  }
  .search-box {
    display: flex;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 28px;
    padding: 4px 4px 4px 20px;
    margin-bottom: 36px;
    backdrop-filter: blur(8px);
  }
  .search-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #fff;
    font-size: 1rem;
    padding: 12px 0;
  }
  .search-box input::placeholder { color: #8080aa; }
  .search-box button {
    background: #6c63ff;
    border: none;
    border-radius: 24px;
    color: #fff;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 10px 24px;
    transition: background 0.2s;
  }
  .search-box button:hover { background: #5a52e0; }
  .section {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    text-align: left;
  }
  .section h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 10px;
    color: #b0b0d0;
  }
  .section ul {
    list-style: none;
    font-size: 0.9rem;
    color: #c0c0e0;
  }
  .section ul li::before {
    content: "\2022";
    color: #6c63ff;
    font-weight: bold;
    display: inline-block;
    width: 1.2em;
  }
  .section ul li { margin-bottom: 4px; }
  .btn {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 10px 28px;
    text-decoration: none;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<div class="container">
  
  <div class="logo-wrapper">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00f2fe" />
          <stop offset="50%" stop-color="#4facfe" />
          <stop offset="100%" stop-color="#6c63ff" />
        </linearGradient>
      </defs>
      <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="url(#auroraGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 6C14.5 8.5 14.5 15.5 12 18" stroke="url(#auroraGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 6C9.5 8.5 9.5 15.5 12 18" stroke="url(#auroraGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2 12H22" stroke="url(#auroraGrad)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>Aurora Browser</h1>
  <p class="subtitle">Built on Chromium &middot; Auto-updating &middot; Private by default</p>

  <form class="search-box" action="https://www.google.com/search" method="GET" target="_top">
    <input type="text" name="q" placeholder="Search Google or type a URL" autofocus>
    <button type="submit">Search</button>
  </form>

  <div class="section">
    <h2>What's New</h2>
    <ul id="updates">
      <li>Checking for updates...</li>
    </ul>
  </div>

  <a class="btn" href="https://github.com/Draftiermovie66/Aurora-Browser" target="_blank">
    View Source Code
  </a>
</div>

<script>
  fetch('https://api.github.com/repos/Draftiermovie66/Aurora-Browser/releases/latest')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      const ul = document.getElementById('updates');
      ul.innerHTML = '';
      const release = document.createElement('li');
      release.innerHTML = '<strong>' + data.tag_name + '</strong> released';
      ul.appendChild(release);
      const notes = data.body ? data.body.split('\\n').filter(l => l.trim()) : [];
      notes.slice(0, 5).forEach(line => {
        const li = document.createElement('li');
        li.textContent = line.replace(/^[-*]\s*/, '');
        ul.appendChild(li);
      });
    })
    .catch(() => {
      document.getElementById('updates').innerHTML = '<li>No update information available</li>';
    });
</script>
</body>
</html>
